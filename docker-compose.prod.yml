services:
  postgres:
    image: postgres:16-alpine
    container_name: flysight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flysight -d flysight"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKERHUB_USERNAME}/flysight-backend:latest
    container_name: flysight-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      EBIRD_API_KEY: ${EBIRD_API_KEY}
      EBIRD_MAX_RESULTS: ${EBIRD_MAX_RESULTS}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: flysight-frontend
    container_name: flysight-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  proxy:
    image: nginx:alpine
    container_name: flysight-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
