services:
  postgres:
    image: postgres:16-alpine
    container_name: flysight-postgres
    environment:
      POSTGRES_DB: flysight
      POSTGRES_USER: flysight
      POSTGRES_PASSWORD: flysight
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flysight -d flysight"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: flysight-backend
    environment:
      PORT: 3000
      DATABASE_URL: postgres://flysight:flysight@postgres:5432/flysight
      JWT_SECRET: change-this-secret
      JWT_EXPIRES_IN: 2h
      CORS_ORIGIN: "*"
      RATE_LIMIT_MAX: 300
      EBIRD_API_KEY: 6m0k41nel9ec
      EBIRD_MAX_RESULTS: 500
    volumes:
      - ./composeApp:/composeApp:ro
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: flysight-frontend
    expose:
      - "80"

  proxy:
    image: nginx:alpine
    container_name: flysight-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data: