name: Build and Deploy Backend

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build Docker image and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flysight-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/flysight-backend:${{ github.sha }}

  notify-server:
    name: Notify Azure VM with webhook
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Send signed webhook request
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/flysight-backend
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_REPOSITORY_VALUE: ${{ github.repository }}
        run: |
          PAYLOAD=$(jq -nc \
            --arg repository "$GITHUB_REPOSITORY_VALUE" \
            --arg sha "$GITHUB_SHA_VALUE" \
            --arg image "$IMAGE_NAME:latest" \
            '{repository: $repository, sha: $sha, image: $image}')

          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | awk '{print $2}')

          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-FlySight-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
